<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Starmaker Coding Blocks Studio</title>
    
    <link rel="icon" href="icons/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="top-bar">

        <div class="logo">
            <img src="icons/favicon.png" 
                    id="studio-icon"> Starmaker Studio
        </div>

        <nav>
            <button onclick="showProjectMenu()">Project</button>
            <button onclick="showBlocksMenu()">Blocks</button>
            <button onclick="showMediaMenu()">Media</button>
            <button onclick="showBuildMenu()">Build</button>
            <button onclick="showStudioMenu()">Studio</button>
        </nav>

    </header>


    <main class="workspace" id="workspace">

    </main>


    <!-- Studio subsections -->
    <script src="js/Pages/Studio/File/page.js"></script>
    <script src="js/Pages/Studio/Edit/page.js"></script>
    <script src="js/Pages/Studio/Help/page.js"></script>
    <script src="js/Pages/Studio/Settings/page.js"></script>

    <!-- Projects -->
    <script src="js/Pages/Projects/projects.js"></script>
    <script src="js/Pages/Projects/page.js"></script>

    <!-- Blocks subsections -->
    <script src="js/Pages/Blocks/Designer/page.js"></script>

    <script src="js/Pages/Blocks/Collections/page.js"></script>

    <script src="js/Pages/Blocks/Library/library.js"></script>
    <script src="js/Pages/Blocks/Library/page.js"></script>


    <!-- Main pages -->
    <script src="js/Pages/Project/page.js"></script>
    <script src="js/Pages/Blocks/page.js"></script>
    <script src="js/Pages/Media/page.js"></script>
    <script src="js/Pages/Build/page.js"></script>
    <script src="js/Pages/Studio/page.js"></script>

    <!-- Core -->
    <script src="js/studio.js"></script>

</body>

</html>
